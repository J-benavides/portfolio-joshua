<section id="hero" class="hero">
  <!-- Circuit background -->
  <div class="hero__bg" aria-hidden="true">
    <svg class="circuit-svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid-dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
          <circle cx="24" cy="24" r="0.7" fill="#00D9F5" opacity="0.18"/>
        </pattern>
        <radialGradient id="center-glow" cx="50%" cy="55%" r="45%">
          <stop offset="0%" stop-color="#00D9F5" stop-opacity="0.05"/>
          <stop offset="100%" stop-color="#0B0F19" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid-dots)"/>
      <g stroke="#00D9F5" stroke-width="0.7" fill="none" opacity="0.14">
        <polyline points="0,180 160,180 160,80 360,80 360,240 560,240 560,120 760,120 760,300 960,300"/>
        <polyline points="1440,320 1280,320 1280,190 1080,190 1080,420 880,420 880,280 760,280"/>
        <polyline points="0,520 120,520 120,450 280,450 280,580 480,580 480,470 640,470 640,360"/>
        <polyline points="1440,560 1360,560 1360,680 1160,680 1160,540 1000,540 1000,420"/>
        <polyline points="360,800 360,660 480,660 480,720 680,720 680,640 820,640 820,500"/>
        <polyline points="1100,800 1100,740 960,740 960,640 820,640"/>
      </g>
      <g fill="#00D9F5">
        <circle *ngFor="let node of circuitNodes" [attr.cx]="node[0]" [attr.cy]="node[1]" r="2.5" opacity="0.45"/>
      </g>
      <g fill="none" stroke="#00D9F5">
        <circle *ngFor="let node of circuitNodes.slice(0, 6)" [attr.cx]="node[0]" [attr.cy]="node[1]" r="6" stroke-width="0.8" opacity="0.15"/>
      </g>
      <rect width="100%" height="100%" fill="url(#center-glow)"/>
    </svg>
    <div class="hero__bg-radial"></div>
    <div class="hero__bg-fade"></div>
  </div>

  <div class="hero__content">
    <!-- Badge -->
    <div class="hero__badge">
      <span class="hero__badge-dot"></span>
      <span class="hero__badge-text">{{ t.hero.badge }}</span>
    </div>

    <!-- Name -->
    <h1 class="hero__name">
      <span class="hero__name-first">{{ t.hero.firstName }}</span>
      <span class="hero__name-last">{{ t.hero.lastName }}</span>
    </h1>

    <!-- Title line -->
    <div class="hero__title-row">
      <span class="hero__title">{{ t.hero.title }}</span>
      <span class="hero__sep">|</span>
      <span class="hero__subtitle">{{ t.hero.subtitle }}</span>
    </div>

    <!-- Bio -->
    <p class="hero__bio">{{ t.hero.bio }}</p>

    <!-- CTAs -->
    <div class="hero__ctas">
      <button class="btn-primary" (click)="goTo('projects')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        {{ t.hero.cta1 }}
      </button>
      <button class="btn-outline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        {{ t.hero.cta2 }}
      </button>
    </div>

    <!-- Scroll indicator -->
    <div class="hero__scroll">
      <span class="hero__scroll-label">scroll</span>
      <div class="hero__scroll-line"></div>
    </div>
  </div>
</section>
