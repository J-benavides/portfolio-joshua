<section id="skills" class="skills">
  <div class="section-inner">
    <div class="section-label">
      <span class="section-label__tag">{{ t.skills.label }}</span>
      <h2 class="section-label__title">{{ t.skills.heading }}</h2>
      <div class="section-label__line"></div>
    </div>

    <div class="skills__grid">
      <div class="skill-card" *ngFor="let cat of skillCards" [style.--cat-color]="cat.color">
        <!-- Header -->
        <div class="skill-card__header">
          <div class="skill-card__icon-wrap" [style.background]="cat.color + '18'">
            <!-- Code2 -->
            <svg *ngIf="cat.icon === 'code2'" width="20" height="20" viewBox="0 0 24 24" fill="none" [attr.stroke]="cat.color" stroke-width="2">
              <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
            </svg>
            <!-- Server -->
            <svg *ngIf="cat.icon === 'server'" width="20" height="20" viewBox="0 0 24 24" fill="none" [attr.stroke]="cat.color" stroke-width="2">
              <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
              <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
              <line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/>
            </svg>
            <!-- Database -->
            <svg *ngIf="cat.icon === 'database'" width="20" height="20" viewBox="0 0 24 24" fill="none" [attr.stroke]="cat.color" stroke-width="2">
              <ellipse cx="12" cy="5" rx="9" ry="3"/>
              <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
              <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
            </svg>
            <!-- Wrench -->
            <svg *ngIf="cat.icon === 'wrench'" width="20" height="20" viewBox="0 0 24 24" fill="none" [attr.stroke]="cat.color" stroke-width="2">
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
          </div>
          <h3 class="skill-card__name">{{ cat.name }}</h3>
        </div>

        <!-- Tech pills -->
        <div class="skill-card__techs">
          <span
            class="tech-pill"
            *ngFor="let tech of cat.techs"
            [style.--pill-color]="cat.color"
          >{{ tech }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
